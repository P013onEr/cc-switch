name: Manual Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-macos:
    name: macOS unsigned app
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.3
          run_install: false

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        env:
          TAURI_BUNDLE_CREATE_UPDATER_ARTIFACTS: "false"
        run: pnpm tauri build --target universal-apple-darwin --config '{"bundle":{"createUpdaterArtifacts":false}}'

      - name: Collect app bundles
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p manual-artifacts
          find src-tauri/target -path "*/release/bundle/*" \( \
            -name "*.app" -o \
            -name "*.dmg" -o \
            -name "*.zip" -o \
            -name "*.tar.gz" \
          \) -print
          while IFS= read -r path; do
            name=$(basename "$path")
            if [ -d "$path" ]; then
              ditto -c -k --sequesterRsrc --keepParent "$path" "manual-artifacts/${name}.zip"
            else
              cp "$path" "manual-artifacts/$name"
            fi
          done < <(find src-tauri/target -path "*/release/bundle/*" \( \
            -name "*.app" -o \
            -name "*.dmg" -o \
            -name "*.zip" -o \
            -name "*.tar.gz" \
          \))
          ls -la manual-artifacts
          test "$(find manual-artifacts -mindepth 1 -maxdepth 1 | wc -l | tr -d ' ')" -gt 0

      - name: Upload app bundles
        uses: actions/upload-artifact@v7
        with:
          name: cc-switch-macos-unsigned
          path: manual-artifacts/*
          if-no-files-found: error
